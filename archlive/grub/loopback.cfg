# Load the required GRUB modules for loopback booting
insmod iso9660
insmod ntfs
insmod exfat
insmod udf

# Search for the ISO and set the root
search --no-floppy --set=root --file /boot/grub/loopback.cfg

# Define the boot entry
menuentry "Gaming Arch Linux (Loopback)" {
    loopback loop $root
    linux (loop)/arch/boot/x86_64/vmlinuz-linux ...
    initrd (loop)/arch/boot/x86_64/initramfs-linux.img
}
