# GRUB configuration for UEFI boot of Custom Arch Linux ISO

# Load required modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod exfat
insmod udf
insmod ext2

# Set default boot entry and timeout
set default=0
set timeout=5

# Play a startup beep (optional)
# play 960 440 1 0 4 440 1

# Main boot entry
menuentry "Gaming Arch Linux (x86_64)" {
    set gfxpayload=keep
    search --no-floppy --set=root --file /arch/boot/x86_64/vmlinuz-linux
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=${archisolabel} add_efi_memmap
    initrd /arch/boot/x86_64/initramfs-linux.img
}

# Fallback entry with nomodeset
menuentry "Gaming Arch Linux (x86_64, nomodeset)" {
    set gfxpayload=keep
    search --no-floppy --set=root --file /arch/boot/x86_64/vmlinuz-linux
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=${archisolabel} nomodeset add_efi_memmap
    initrd /arch/boot/x86_64/initramfs-linux.img
}

# Copy to RAM option
menuentry "Gaming Arch Linux (x86_64, copy to RAM)" {
    set gfxpayload=keep
    search --no-floppy --set=root --file /arch/boot/x86_64/vmlinuz-linux
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=${archisolabel} copytoram add_efi_memmap
    initrd /arch/boot/x86_64/initramfs-linux.img
}

# Memtest86+ (if included)
menuentry "Memtest86+ (RAM test)" {
    search --no-floppy --set=root --file /arch/boot/memtest86+/memtest
    linux /arch/boot/memtest86+/memtest
}

# Reboot and Power Off
menuentry "Reboot" {
    reboot
}

menuentry "Power Off" {
    halt
}
