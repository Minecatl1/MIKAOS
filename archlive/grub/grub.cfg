# Load the required GRUB modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod exfat
insmod udf
insmod ext2

# Set the default boot entry
set default=0
set timeout=5

# Define the main boot entry
menuentry "Gaming Arch Linux" {
    set gfxpayload=keep
    search --no-floppy --set=root --file /arch/boot/x86_64/vmlinuz-linux
    linux /arch/boot/x86_64/vmlinuz-linux archisobasedir=arch archisolabel=${archisolabel} ...
    initrd /arch/boot/x86_64/initramfs-linux.img
}
